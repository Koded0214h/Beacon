version: "3.8"

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.1
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s

  create-topic:
    image: redpandadata/redpanda:v24.2.1
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: >
      rpk topic create agent-state-transitions
        --brokers redpanda:29092
        --partitions 12
        --replicas 1
    restart: "no"

  console:
    image: redpandadata/console:v2.7.0
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
    depends_on:
      redpanda:
        condition: service_healthy

volumes:
  redpanda-data:
