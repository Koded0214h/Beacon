global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: beacon-load-balancer
    static_configs:
      - targets: [localhost:8000]

  - job_name: beacon-broadcaster
    static_configs:
      - targets: [localhost:8001]

  - job_name: beacon-archiver
    static_configs:
      - targets: [localhost:8002]

  - job_name: beacon-watchtower
    static_configs:
      - targets: [localhost:9000]

  # Scrapes up to 8 gateway instances; Prometheus marks absent targets as down.
  - job_name: beacon-gateways
    static_configs:
      - targets:
          - localhost:8010
          - localhost:8011
          - localhost:8012
          - localhost:8013
          - localhost:8014
          - localhost:8015
          - localhost:8016
          - localhost:8017
